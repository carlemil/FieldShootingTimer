<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fältskyttetimer — ladda ner</title>
  <meta name="description" content="Fältskyttetimer för Android och iPhone. Skanna eller klicka på en QR-kod för att ladda ner appen.">
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d23;
      --text: #f2f4f8;
      --muted: #9aa3b2;
      --accent: #4f9dff;
      --border: #2a2f38;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fa;
        --card: #ffffff;
        --text: #14171c;
        --muted: #5b6472;
        --accent: #1668d6;
        --border: #e2e6ee;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 0 0 .5rem; }
    header p { color: var(--muted); margin: 0; font-size: 1.05rem; }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      width: 100%;
      max-width: 760px;
    }
    .card {
      flex: 1 1 300px;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.75rem;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      outline: none;
    }
    .card h2 { margin: 0 0 1.25rem; font-size: 1.25rem; }
    .qr {
      width: 100%;
      max-width: 240px;
      height: auto;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      display: block;
      margin: 0 auto 1.25rem;
    }
    .badge {
      display: inline-block;
      padding: .6rem 1.2rem;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: .95rem;
    }
    .hint { color: var(--muted); font-size: .85rem; margin-top: .9rem; }
    footer { margin-top: 2.5rem; color: var(--muted); font-size: .85rem; text-align: center; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Fältskyttetimer</h1>
    <p>Skanna en QR-kod eller klicka på den för att ladda ner appen.</p>
  </header>

  <main class="cards">
    <a class="card"
       href="https://play.google.com/store/apps/details?id=se.kjellstrand.fieldshootingtimer">
      <h2>Android — Google Play</h2>
      <img class="qr" src="qr-google-play.png"
           alt="QR-kod till Fältskyttetimer på Google Play">
      <span class="badge">Hämta på Google Play</span>
      <p class="hint">Skanna med kameran eller klicka på rutan</p>
    </a>

    <a class="card"
       href="https://apps.apple.com/se/app/f%C3%A4ltskyttetimer/id6778128329">
      <h2>iPhone — App Store</h2>
      <img class="qr" src="qr-app-store.png"
           alt="QR-kod till Fältskyttetimer på App Store">
      <span class="badge">Hämta i App Store</span>
      <p class="hint">Skanna med kameran eller klicka på rutan</p>
    </a>
  </main>

  <footer>
    <p>Fältskyttetimer ·
      <a href="https://github.com/carlemil/FieldShootingTimer">källkod på GitHub</a>
    </p>
  </footer>
</body>
</html>
